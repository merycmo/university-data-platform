version: '3.8'

services:

  # ─── MinIO - Stockage brut ────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: university_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── MinIO Init - Création automatique des buckets ───
  minio-init:
    image: minio/mc:latest
    container_name: university_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password123;
      mc mb --ignore-existing local/raw-web-html;
      mc mb --ignore-existing local/raw-documents;
      mc mb --ignore-existing local/raw-images;
      mc mb --ignore-existing local/raw-json;
      mc mb --ignore-existing local/raw-logs;
      mc mb --ignore-existing local/curated;
      echo 'Buckets créés avec succès';
      "

  # ─── Spark Master ─────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: university_spark_master
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ../spark:/opt/spark-apps
      - ../ingestion:/opt/ingestion

  # ─── Spark Worker ─────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.0
    container_name: university_spark_worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - ../spark:/opt/spark-apps

  # ─── PostgreSQL pour Hive ─────────────────────────────
  postgres:
    image: postgres:13
    container_name: university_postgres
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Hive Metastore ───────────────────────────────────
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: university_hive
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive123
    volumes:
      - hive_data:/opt/hive/data

  # ─── Elasticsearch ────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: university_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Metabase - Dashboard ─────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: university_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase-data

  # ─── PostgreSQL pour Airflow ──────────────────────────
  postgres-airflow:
    image: postgres:13
    container_name: university_postgres_airflow
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow123
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Airflow Init ─────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.0
    container_name: university_airflow_init
    depends_on:
      postgres-airflow:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@postgres-airflow/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: >
      bash -c "
      airflow db init &&
      airflow users create
        --username admin
        --password admin123
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@university.ma
      "
    volumes:
      - ../dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs

  # ─── Airflow Webserver ────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: university_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@postgres-airflow/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Airflow Scheduler ────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: university_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@postgres-airflow/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler

volumes:
  minio_data:
  postgres_data:
  hive_data:
  es_data:
  metabase_data:
  postgres_airflow_data:
  airflow_logs: